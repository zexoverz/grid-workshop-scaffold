name: Deploy to scaffold VM

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: scaffold-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Forks of this scaffold won't try to deploy. Only the canonical repo runs this job.
    if: github.repository == 'zexoverz/grid-workshop-scaffold'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Run server-deploy.sh on VM
        env:
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          REF: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST" "REF='$REF' bash -s" < scripts/deploy/server-deploy.sh
